name: "Increment Version"
description: "Increment semantic version and create a new tag"

inputs:
  tag:
    description: "Tag value"
    required: true
  create-aliases:
    description: "Create / update alias tags for major and minor versions"
    type: boolean
    required: false
    default: false

runs:
  using: "composite"
  steps:
    - name: Create Version Tag
      uses: actions/github-script@v9
      env:
        VERSION: ${{ inputs.tag }}
      with:
        script: |
          const version = process.env.VERSION;
          console.log(`Got version ${version}`);

          github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: `refs/tags/${version}`,
            sha: context.sha
          }).catch(err => {
            if (context.ref === 'refs/heads/main') throw err;
            console.log(`Skipping creation of existing tag ${version}`);
          });

    - name: Create Major / Minor Alias Tags
      uses: actions/github-script@v9
      env:
        VERSION: ${{ inputs.tag }}
      with:
        script: |
          const version = process.env.VERSION;
          console.log(`Got version ${version}`);

          if (!/([0-9]+\.){2}/.test(version)) {
            throw new Error(`Invalid version ${version}`);
          }
          const [major, minor] = version.split('.', 2);
          console.log({major, minor});

          // Major version
          github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: `refs/tags/v${major}`,
            sha: context.sha
          }).catch(err => {
            if (err.status !== 422) throw err;
            github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              // Note: without /ref/
              ref: `tags/v${major}`,
              sha: context.sha
            });
          });

          // Major.Minor version
          github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: `refs/tags/v${major}.${minor}`,
            sha: context.sha
          }).catch(err => {
            if (err.status !== 422) throw err;
            github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              // Note: without /ref/
              ref: `tags/v${major}.${minor}`,
              sha: context.sha
            });
          });
