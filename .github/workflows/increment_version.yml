name: Increment Version

on:
  workflow_call:
    inputs:
      dry-run:
        description: Skip tag creation and only output new version
        type: boolean
        required: false
        default: false
      tag:
        description: Explicit tag value to use instead of generating a new value
        type: string
        required: false
      aliases:
        description: Create / update alias tags for major and minor versions
        type: boolean
        required: false
        default: false

    outputs:
      current-version:
        description: "The current version"
        value: ${{ jobs.increment_version.outputs.current-version }}
      version:
        description: "The new version"
        value: ${{ jobs.increment_version.outputs.version }}

jobs:
  increment_version:
    name: Increment Version
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      current-version: ${{ steps.version.outputs.current-version }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Increment version
        uses: automas-dev/reusable-workflows/increment_version@main
        id: version
        with:
          dry-run: ${{ inputs.dry-run }}
          aliases: ${{ inputs.aliases }}

      - name: Increment version
        uses: automas-dev/reusable-workflows/increment_version@main
        with:
          tag: ${{ steps.version.outputs.version }}
          aliases: true
