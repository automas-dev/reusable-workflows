name: test

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  increment_version:
    name: Increment Version
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get next version
        uses: reecetech/version-increment@2024.10.1
        id: version
        with:
          scheme: conventional_commits

      - name: Create Version Tag
        uses: actions/github-script@v9
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const version = process.env.VERSION;
            console.log(`Got version ${version}`);

            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${version}`,
              sha: context.sha
            }).catch(err => {
              if (context.ref === 'refs/heads/main') throw err;
              console.log(`Skipping creation of existing tag ${version}`)
            });

      - name: Create Major / Minor Alias Tags
        uses: actions/github-script@v9
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const version = process.env.VERSION;
            console.log(`Got version ${version}`);

            if (!/([0-9]+\.){2}/.test(version)) {
              throw new Error(`Invalid version ${version}`);
            }
            const [major, minor] = version.split('.', 2);
            console.log({major, minor});

            // Major version
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${major}`,
              sha: context.sha
            }).catch(err => {
              throw err;
              if (err.status !== 422) throw err;
              github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/v${major}`,
                sha: context.sha,
                force: true
              });
            });

            // Major.Minor version
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${major}.${minor}`,
              sha: context.sha
            }).catch(err => {
              throw err;
              if (err.status !== 422) throw err;
              github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/v${major}.${minor}`,
                sha: context.sha,
                force: true
              });
            });
