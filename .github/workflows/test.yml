name: test

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  increment_version:
    name: Increment Version
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Increment version
        uses: automas-dev/reusable-workflows/increment_version@main
        id: version
        with:
          dry-run: true

      - name: Increment version
        uses: automas-dev/reusable-workflows/increment_version@main
        with:
          tag: ${{ steps.version.outputs.version }}
          create-aliases: true
