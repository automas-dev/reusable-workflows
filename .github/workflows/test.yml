name: test

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  increment_version:
    name: Increment Version
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Increment version
        uses: automas-dev/reusable-workflows/increment_version@feat/refactor_increment_version
        with:
          dry-run: true
          create-aliases: true

      - run: echo ${{ steps.version.outputs.current-version }}
      - run: echo ${{ steps.version.outputs.version }}

      - name: Increment version
        uses: automas-dev/reusable-workflows/increment_version@feat/refactor_increment_version
        id: version2
        with:
          dry-run: true
          tag: explicit
          create-aliases: true

      - run: echo ${{ steps.version2.outputs.current-version }}
      - run: echo ${{ steps.version2.outputs.version }}
