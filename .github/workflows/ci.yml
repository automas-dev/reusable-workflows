name: ci

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install YAML Lint
        run: pip install yamllint

      - name: Run YAML Lint
        run: yamllint -c yamllint.yml .

  increment_version:
    name: Increment Version
    uses: ./.github/workflows/increment_version.yml
    secrets: inherit
    with:
      dry-run: ${{ github.ref != 'refs/heads/main' || contains(github.event.head_commit.message, 'NO RELEASE') }}
      aliases: true
      prefix: v

    needs: [lint]

    permissions:
      contents: write

  ci-pass:
    runs-on: ubuntu-latest

    needs: [lint, increment_version]

    steps:
      - run: echo CI build passed
