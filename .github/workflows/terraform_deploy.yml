on:
  workflow_call:
    inputs:
      git-tag:
        description: Git version tag
        type: string
        required: false
      increment-version:
        description: Increment version tag instead of using git-tag input
        type: boolean
        required: false
        default: true
      working-directory:
        description: Location of terraform code
        type: string
        required: false
        default: terraform

    outputs:
      current-version:
        description: The current version
        value: ${{ jobs.tf.outputs.current-version }}
      version:
        description: The new version
        value: ${{ jobs.tf.outputs.version }}

jobs:
  tf:
    name: Terraform Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      current-version: ${{ steps.version.outputs.current-version }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      # See https://cloudchronicles.blog/blog/Passing-Environment-Secrets-and-Variables-to-Reusable-Workflows-in-GitHub-Actions/

      - name: Export TF_VAR secrets
        uses: actions/github-script@v8.0.0
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        with:
          script: |
            const secrets = JSON.parse(process.env.ALL_SECRETS);
            for (const [key, value] of Object.entries(secrets)) {
              if (key.startsWith('TF_VAR_')) {
                const exportKey = `TF_VAR_${key.slice('TF_VAR_'.length).toLowerCase()}`;
                core.exportVariable(exportKey, value);
                core.info(`Exported: ${key} as ${exportKey}`);
              }
            }

      - name: Export TF_VAR vars
        uses: actions/github-script@v8.0.0
        env:
          ALL_VARS: ${{ toJSON(vars) }}
        with:
          script: |
            const vars = JSON.parse(process.env.ALL_VARS);
            for (const [key, value] of Object.entries(vars)) {
              if (key.startsWith('TF_VAR_')) {
                const exportKey = `TF_VAR_${key.slice('TF_VAR_'.length).toLowerCase()}`;
                core.exportVariable(exportKey, value);
                core.info(`Exported: ${key} as ${exportKey}`);
              }
            }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Terraform Lint
        run: terraform fmt -check
        working-directory: terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=$BUCKET" \
            -backend-config="access_key=$ACCESS_KEY" \
            -backend-config="secret_key=$SECRET_KEY" \
            -backend-config="endpoints={s3=\"https://${ACCOUNT_ID}.r2.cloudflarestorage.com\"}"
        working-directory: terraform
        env:
          ACCOUNT_ID: ${{ vars.TFSTATE_ACCOUNT_ID }}
          BUCKET: ${{ vars.TFSTATE_BUCKET }}
          ACCESS_KEY: ${{ secrets.TFSTATE_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.TFSTATE_SECRET_KEY }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Get next git tag
        id: version
        uses: automas-dev/reusable-workflows/increment_version@main
        with:
          create-tag: false

      - name: Terraform Plan
        run: terraform plan -out tfplan.out
        working-directory: terraform
        env:
          TF_VAR_git_tag: ${{ inputs.increment-version && steps.version.outputs.version ||
            inputs.git-tag }}

      - name: Create Plan Comment
        uses: borchero/terraform-plan-comment@v3.0.0
        with:
          token: ${{ github.token }}
          planfile: tfplan.out
          working-directory: terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, 'NO RELEASE')
        run: terraform apply -auto-approve tfplan.out
        working-directory: terraform

      - name: Create git version tag
        if: inputs.increment-version && github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, 'NO RELEASE')
        uses: automas-dev/reusable-workflows/create_tag@main
        with:
          tag: ${{ steps.version.outputs.version }}
